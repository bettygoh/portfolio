document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"699e892c-e11e-4437-a91c-24c3d99fce13\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"58ad9020-4373-4c61-8482-0a6cb661297c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"06fd749c-c0b3-476a-adaf-e5df65130462\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =========================================================\n   Betty — Portfolio\n   Warm & human, cool-neutral base, one quiet blue accent.\n   ========================================================= */\n\n:root {\n  /* --- accent (overridable by Tweaks: only --accent is set) --- */\n  --accent: #3A6DF0;\n  --accent-press: color-mix(in oklab, var(--accent), #0a1020 20%);\n  --accent-tint: color-mix(in oklab, var(--accent), transparent 88%);\n\n  /* --- cool neutral palette --- */\n  --bg: oklch(0.985 0.004 250);\n  --bg-2: oklch(0.965 0.005 250);\n  --surface: oklch(1 0 0);\n  --ink: #161A23;\n  --ink-soft: oklch(0.46 0.013 255);\n  --muted: oklch(0.60 0.010 255);\n  --line: oklch(0.91 0.006 255);\n  --line-soft: oklch(0.94 0.005 255);\n\n  /* --- type --- */\n  --font-head: \"Schibsted Grotesk\", system-ui, sans-serif;\n  --font-body: \"Hanken Grotesk\", system-ui, sans-serif;\n\n  --maxw: 1180px;\n  --gutter: clamp(20px, 5vw, 72px);\n  --radius: 18px;\n  --curve: clamp(32px, 5vw, 64px);\n\n  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);\n}\n\n* { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--font-body);\n  font-size: 18px;\n  line-height: 1.6;\n  font-weight: 400;\n  letter-spacing: 0.002em;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow-x: hidden;\n}\n\n@media (prefers-reduced-motion: reduce) {\n  * { animation: none !important; transition: none !important; }\n}\n\nh1, h2, h3 {\n  font-family: var(--font-head);\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  line-height: 1.04;\n  margin: 0;\n  text-wrap: balance;\n}\n\na { color: inherit; text-decoration: none; }\nimg { display: block; max-width: 100%; }\n\n.wrap {\n  width: 100%;\n  max-width: var(--maxw);\n  margin-inline: auto;\n  padding-inline: var(--gutter);\n}\n\n.eyebrow {\n  font-family: var(--font-head);\n  font-size: 13px;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--accent-press);\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.eyebrow::before {\n  content: \"\";\n  width: 22px;\n  height: 1.5px;\n  background: var(--accent);\n  display: inline-block;\n}\n\n/* =========================================================\n   NAV\n   ========================================================= */\n.nav {\n  position: fixed;\n  inset: 0 0 auto 0;\n  z-index: 50;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 18px var(--gutter);\n  background: color-mix(in oklab, var(--bg) 72%, transparent);\n  backdrop-filter: blur(14px) saturate(1.1);\n  -webkit-backdrop-filter: blur(14px) saturate(1.1);\n  border-bottom: 1px solid transparent;\n  transition: border-color 0.4s var(--ease), background 0.4s var(--ease);\n}\n.nav.scrolled { border-bottom-color: var(--line); }\n\n.brand {\n  font-family: var(--font-head);\n  font-weight: 600;\n  font-size: 17px;\n  letter-spacing: -0.01em;\n  display: flex;\n  align-items: center;\n  gap: 11px;\n}\n.brand-logo {\n  width: 30px; height: 30px;\n  display: block;\n  flex-shrink: 0;\n  border: 1px dashed var(--line);\n  border-radius: 50%;\n  background: var(--bg-2);\n  font-size: 8px;\n}\n\n.nav-links { display: flex; align-items: center; gap: 4px; }\n.nav-links a {\n  font-size: 15px;\n  color: var(--ink-soft);\n  padding: 8px 14px;\n  border-radius: 999px;\n  white-space: nowrap;\n  transition: color 0.25s var(--ease), background 0.25s var(--ease);\n}\n.nav-links a:hover { color: var(--ink); background: var(--bg-2); }\n.nav-links a.cta {\n  color: var(--surface);\n  background: var(--ink);\n  margin-left: 6px;\n  padding-inline: 18px;\n}\n.nav-links a.cta:hover { background: var(--accent-press); color: #fff; }\n\n.nav-toggle {\n  display: none;\n  width: 42px; height: 42px;\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  background: var(--surface);\n  cursor: pointer;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 5px;\n  flex-shrink: 0;\n}\n.nav-toggle span {\n  width: 18px; height: 2px;\n  background: var(--ink);\n  border-radius: 2px;\n  transition: transform 0.3s var(--ease), opacity 0.2s var(--ease);\n}\n.nav.open .nav-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }\n.nav.open .nav-toggle span:nth-child(2) { opacity: 0; }\n.nav.open .nav-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }\n\n@media (max-width: 680px) {\n  .nav { padding-inline: clamp(16px, 5vw, 24px); }\n  .nav-toggle { display: flex; }\n  .nav-links {\n    position: fixed;\n    top: 68px; left: 12px; right: 12px;\n    flex-direction: column;\n    align-items: stretch;\n    gap: 4px;\n    background: color-mix(in oklab, var(--bg) 97%, transparent);\n    backdrop-filter: blur(18px) saturate(1.1);\n    -webkit-backdrop-filter: blur(18px) saturate(1.1);\n    border: 1px solid var(--line);\n    border-radius: 20px;\n    padding: 10px;\n    box-shadow: 0 26px 54px -26px oklch(0.3 0.03 255 / 0.4);\n    opacity: 0;\n    transform: translateY(-10px) scale(0.99);\n    transform-origin: top center;\n    pointer-events: none;\n    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);\n  }\n  .nav.open .nav-links { opacity: 1; transform: none; pointer-events: auto; }\n  .nav-links a { display: block; font-size: 16px; padding: 14px 16px; border-radius: 12px; }\n  .nav-links a.cta { margin-left: 0; margin-top: 4px; text-align: center; }\n}\n\n/* =========================================================\n   HERO\n   ========================================================= */\n.hero {\n  position: relative;\n  min-height: 100svh;\n  display: flex;\n  align-items: center;\n  padding-top: 90px;\n  padding-bottom: clamp(110px, 18vh, 180px);\n  overflow: hidden;\n}\n.hero-stage {\n  position: absolute;\n  inset: 0;\n  z-index: 0;\n  pointer-events: none;\n}\n\n/* Orb motion */\n.orb {\n  position: absolute;\n  border-radius: 50%;\n  filter: blur(46px);\n  opacity: 0.55;\n  will-change: transform;\n}\n.orb.a {\n  width: 46vw; height: 46vw;\n  right: -6vw; top: 4vh;\n  background: radial-gradient(circle at 35% 35%, var(--accent), transparent 68%);\n  animation: driftA 22s ease-in-out infinite;\n}\n.orb.b {\n  width: 36vw; height: 36vw;\n  right: 16vw; top: 30vh;\n  background: radial-gradient(circle at 50% 50%, oklch(0.82 0.12 355), transparent 66%);\n  opacity: 0.5;\n  animation: driftB 28s ease-in-out infinite;\n}\n.orb.c {\n  width: 26vw; height: 26vw;\n  right: 32vw; top: 4vh;\n  background: radial-gradient(circle at 50% 50%, oklch(0.84 0.1 330), transparent 66%);\n  opacity: 0.34;\n  animation: driftA 32s ease-in-out infinite reverse;\n}\n@keyframes driftA {\n  0%, 100% { transform: translate(0, 0) scale(1); }\n  33% { transform: translate(-3vw, 4vh) scale(1.08); }\n  66% { transform: translate(2vw, -3vh) scale(0.96); }\n}\n@keyframes driftB {\n  0%, 100% { transform: translate(0, 0) scale(1); }\n  50% { transform: translate(4vw, 5vh) scale(1.12); }\n}\n\n/* Lines motion */\n.lines { position: absolute; inset: 0; opacity: 0; }\n.lines span {\n  position: absolute;\n  left: 0; right: 0;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--accent), transparent);\n  opacity: 0.18;\n  animation: slideLine 9s linear infinite;\n}\n@keyframes slideLine {\n  0% { transform: translateX(-40%); opacity: 0; }\n  20% { opacity: 0.22; }\n  80% { opacity: 0.22; }\n  100% { transform: translateX(40%); opacity: 0; }\n}\n\n/* motion mode switches */\n:root[data-motion=\"lines\"] .orb { display: none; }\n:root[data-motion=\"lines\"] .lines { opacity: 1; }\n:root[data-motion=\"off\"] .orb,\n:root[data-motion=\"off\"] .lines { display: none; }\n\n.hero .wrap { position: relative; z-index: 1; }\n\n.hero-grid {\n  display: grid;\n  grid-template-columns: minmax(0, 1fr);\n  gap: 40px;\n  max-width: 920px;\n}\n\n.hero h1 {\n  font-size: clamp(42px, 7.2vw, 92px);\n  letter-spacing: -0.035em;\n}\n.hero h1 .accentword {\n  color: var(--accent-press);\n  font-style: italic;\n  font-weight: 500;\n}\n.hero-lede {\n  font-size: clamp(18px, 2.1vw, 22px);\n  color: var(--ink-soft);\n  max-width: 56ch;\n  line-height: 1.55;\n}\n.hero-meta {\n  display: flex;\n  flex-wrap: wrap;\n  align-items: center;\n  gap: 10px 14px;\n  margin-top: 4px;\n}\n.chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 14px;\n  color: var(--ink-soft);\n  background: var(--surface);\n  border: 1px solid var(--line);\n  padding: 8px 14px;\n  border-radius: 999px;\n}\n.chip .led {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: oklch(0.7 0.14 150);\n  box-shadow: 0 0 0 0 oklch(0.7 0.14 150 / 0.6);\n  animation: led 2.4s ease-out infinite;\n}\n.chip-ic { flex-shrink: 0; display: block; }\n.ic-in { display: inline-block; vertical-align: -3px; margin: 0 4px; flex-shrink: 0; }\n@keyframes led {\n  0% { box-shadow: 0 0 0 0 oklch(0.7 0.14 150 / 0.5); }\n  70%, 100% { box-shadow: 0 0 0 7px oklch(0.7 0.14 150 / 0); }\n}\n\n.hero-cta { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }\n.btn {\n  font-family: var(--font-head);\n  font-weight: 600;\n  font-size: 16px;\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 14px 24px;\n  border-radius: 999px;\n  cursor: pointer;\n  border: 1px solid transparent;\n  transition: transform 0.25s var(--ease), background 0.25s var(--ease), box-shadow 0.25s var(--ease), color 0.25s var(--ease);\n}\n.btn .arrow { transition: transform 0.3s var(--ease); }\n.btn:hover .arrow { transform: translateX(4px); }\n.btn-primary {\n  background: var(--ink);\n  color: var(--surface);\n}\n.btn-primary:hover { background: var(--accent-press); box-shadow: 0 12px 30px -12px var(--accent); transform: translateY(-1px); }\n.btn-ghost {\n  color: var(--ink);\n  border-color: var(--line);\n  background: color-mix(in oklab, var(--surface) 60%, transparent);\n}\n.btn-ghost:hover { border-color: var(--ink); transform: translateY(-1px); }\n\n.scroll-hint {\n  position: absolute;\n  left: var(--gutter); bottom: 26px;\n  display: flex; align-items: center; gap: 12px;\n  font-size: 12.5px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--muted);\n  font-family: var(--font-head); font-weight: 600;\n  z-index: 1;\n}\n.scroll-hint .track {\n  width: 30px; height: 1.5px; background: var(--line);\n  position: relative; overflow: hidden;\n}\n.scroll-hint .track::after {\n  content: \"\"; position: absolute; inset: 0; width: 50%;\n  background: var(--accent);\n  animation: track 2.6s var(--ease) infinite;\n}\n@keyframes track {\n  0% { transform: translateX(-100%); }\n  100% { transform: translateX(200%); }\n}\n\n/* =========================================================\n   SECTION SCAFFOLD\n   ========================================================= */\nsection { position: relative; }\n.section-pad { padding-block: clamp(80px, 12vh, 150px); }\n\n.section-head {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  gap: 24px;\n  margin-bottom: 48px;\n}\n.section-head:has(+ .section-sub) { margin-bottom: 14px; }\n.section-sub {\n  max-width: 52ch;\n  font-size: 17px;\n  color: var(--ink-soft);\n  margin: 0 0 48px;\n  line-height: 1.55;\n}\n.work-cta {\n  display: flex;\n  justify-content: center;\n  margin-top: clamp(44px, 7vh, 72px);\n}\n.section-head h2 {\n  font-size: clamp(30px, 4.4vw, 52px);\n  letter-spacing: -0.03em;\n  max-width: 18ch;\n}\n.section-head .aside {\n  font-size: 15px;\n  color: var(--muted);\n  text-align: right;\n  max-width: 24ch;\n  flex-shrink: 0;\n}\n@media (max-width: 640px) {\n  .section-head { flex-direction: column; align-items: flex-start; gap: 14px; }\n  .section-head .aside { text-align: left; }\n}\n\n/* =========================================================\n   WORK  (three layouts via [data-work])\n   ========================================================= */\n.work-list { display: grid; gap: 0; }\n\n/* Consistent DOM across layouts:\n   .project > .p-index, .p-thumb, .p-main(.p-title,.p-desc,.p-tags), .p-go */\n.project {\n  position: relative;\n  display: grid;\n  align-items: center;\n  cursor: pointer;\n  background: transparent;\n}\n.p-main { min-width: 0; display: flex; flex-direction: column; }\n.p-date {\n  font-family: var(--font-head);\n  font-size: 11.5px;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 9px;\n}\n.p-thumb {\n  position: relative;\n  overflow: hidden;\n  border-radius: var(--radius);\n  background: var(--bg-2);\n  border: 1px solid var(--line);\n  isolation: isolate;\n}\n.p-thumb .ph {\n  position: absolute; inset: 0;\n  background-image:\n    repeating-linear-gradient(135deg, var(--line-soft) 0 12px, transparent 12px 24px);\n  background-color: var(--bg-2);\n}\n.p-thumb .ph-tag {\n  position: absolute; left: 14px; bottom: 12px;\n  font-family: var(--font-body);\n  font-size: 11.5px; letter-spacing: 0.04em;\n  color: var(--muted);\n  background: color-mix(in oklab, var(--surface) 80%, transparent);\n  border: 1px solid var(--line);\n  padding: 4px 9px; border-radius: 7px;\n}\n.p-thumb .swatch {\n  position: absolute; inset: 0;\n  opacity: 0.9;\n  transition: transform 0.7s var(--ease), opacity 0.5s var(--ease);\n}\n.project:hover .p-thumb .swatch { transform: scale(1.05); }\n.p-thumb .glow {\n  position: absolute; inset: 0;\n  background: radial-gradient(120% 90% at 70% 20%, var(--accent-tint), transparent 60%);\n  opacity: 0; transition: opacity 0.5s var(--ease);\n}\n.project:hover .p-thumb .glow { opacity: 1; }\n\n.p-index {\n  font-family: var(--font-head);\n  font-size: 13px; font-weight: 600;\n  color: var(--muted);\n  font-variant-numeric: tabular-nums;\n}\n.p-title {\n  font-family: var(--font-head);\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  line-height: 1.08;\n  transition: color 0.3s var(--ease);\n}\n.project:hover .p-title { color: var(--accent-press); }\n.p-desc { color: var(--ink-soft); font-size: 16px; line-height: 1.5; }\n.p-tags { display: flex; flex-wrap: wrap; gap: 7px; }\n.p-tag {\n  font-size: 12.5px; color: var(--ink-soft);\n  border: 1px solid var(--line); border-radius: 999px;\n  padding: 4px 11px;\n}\n.p-go {\n  width: 44px; height: 44px;\n  border-radius: 50%;\n  border: 1px solid var(--line);\n  display: grid; place-items: center;\n  color: var(--ink);\n  flex-shrink: 0;\n  transition: background 0.3s var(--ease), color 0.3s var(--ease), transform 0.3s var(--ease), border-color 0.3s var(--ease);\n}\n.p-go svg { transition: transform 0.3s var(--ease); }\n.project:hover .p-go {\n  background: var(--ink); color: var(--surface); border-color: var(--ink);\n  transform: rotate(-45deg);\n}\n\n/* ---- LIST layout (editorial rows) ---- */\n:root[data-work=\"list\"] .project {\n  grid-template-columns: 56px minmax(0, 1fr) 52px;\n  gap: 26px;\n  padding: 30px 10px;\n  border-top: 1px solid var(--line);\n}\n:root[data-work=\"list\"] .project:last-child { border-bottom: 1px solid var(--line); }\n:root[data-work=\"list\"] .p-thumb { display: none; }\n:root[data-work=\"list\"] .p-desc { display: none; }\n:root[data-work=\"list\"] .p-title { font-size: clamp(24px, 3.4vw, 38px); }\n:root[data-work=\"list\"] .p-tags { margin-top: 12px; }\n:root[data-work=\"list\"] .project::after {\n  content: \"\"; position: absolute; inset: 50% 0; opacity: 0;\n  background: var(--accent-tint);\n  z-index: -1; border-radius: 14px;\n  transition: inset 0.4s var(--ease), opacity 0.4s var(--ease);\n}\n:root[data-work=\"list\"] .project:hover::after { inset: 0; opacity: 1; }\n:root[data-work=\"list\"] .project:hover { padding-inline: 26px; }\n@media (max-width: 720px) {\n  :root[data-work=\"list\"] .project { grid-template-columns: 38px 1fr 44px; gap: 16px; }\n  :root[data-work=\"list\"] .p-tags { display: none; }\n}\n\n/* ---- CARDS layout (soft, friendly) ---- */\n:root[data-work=\"cards\"] .work-list {\n  grid-template-columns: repeat(2, minmax(0, 1fr));\n  gap: 30px;\n}\n:root[data-work=\"cards\"] .project {\n  grid-template-columns: 1fr;\n  align-items: stretch;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: calc(var(--radius) + 6px);\n  padding: 16px 16px 26px;\n  transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease), border-color 0.4s var(--ease);\n}\n:root[data-work=\"cards\"] .project:hover {\n  transform: translateY(-6px);\n  box-shadow: 0 26px 50px -28px oklch(0.4 0.04 255 / 0.45);\n  border-color: color-mix(in oklab, var(--accent) 40%, var(--line));\n}\n:root[data-work=\"cards\"] .p-thumb { aspect-ratio: 16 / 10; margin-bottom: 22px; }\n:root[data-work=\"cards\"] .p-index { display: none; }\n:root[data-work=\"cards\"] .p-main { padding-inline: 6px; }\n:root[data-work=\"cards\"] .p-title { font-size: 25px; margin-bottom: 10px; }\n:root[data-work=\"cards\"] .p-desc { margin-bottom: 18px; }\n:root[data-work=\"cards\"] .p-go { display: none; }\n@media (max-width: 720px) {\n  :root[data-work=\"cards\"] .work-list { grid-template-columns: 1fr; }\n}\n\n/* ---- GRID layout (asymmetric, structured) ---- */\n:root[data-work=\"grid\"] .work-list {\n  grid-template-columns: repeat(6, 1fr);\n  gap: 22px;\n}\n:root[data-work=\"grid\"] .project {\n  grid-template-columns: 1fr;\n  align-items: stretch;\n  align-content: start;\n  border-radius: var(--radius);\n}\n:root[data-work=\"grid\"] .project:nth-child(4n+1) { grid-column: span 4; }\n:root[data-work=\"grid\"] .project:nth-child(4n+2) { grid-column: span 2; }\n:root[data-work=\"grid\"] .project:nth-child(4n+3) { grid-column: span 2; }\n:root[data-work=\"grid\"] .project:nth-child(4n+4) { grid-column: span 4; }\n:root[data-work=\"grid\"] .p-thumb { height: 360px; margin-bottom: 16px; }\n:root[data-work=\"grid\"] .project:nth-child(4n+2) .p-thumb,\n:root[data-work=\"grid\"] .project:nth-child(4n+3) .p-thumb { height: 360px; }\n:root[data-work=\"grid\"] .p-index {\n  position: absolute; top: 14px; left: 16px; z-index: 2;\n  color: #fff; mix-blend-mode: difference;\n}\n:root[data-work=\"grid\"] .p-title { font-size: 22px; margin-bottom: 8px; }\n:root[data-work=\"grid\"] .p-go { display: none; }\n:root[data-work=\"grid\"] .p-desc { font-size: 15px; margin-bottom: 14px; }\n@media (max-width: 720px) {\n  :root[data-work=\"grid\"] .work-list { grid-template-columns: 1fr; }\n  :root[data-work=\"grid\"] .project { grid-column: span 1 !important; }\n  :root[data-work=\"grid\"] .p-thumb { height: 240px; }\n}\n\n/* =========================================================\n   ABOUT\n   ========================================================= */\n.about {\n  background: var(--bg-2);\n  border-top: 1px solid var(--line);\n  position: relative;\n  z-index: 1;\n  border-bottom-left-radius: var(--curve);\n  border-bottom-right-radius: var(--curve);\n}\n\n/* Reusable: any section that should curve down into the dark contact block. */\n.curves-down {\n  position: relative;\n  z-index: 1;\n  background: var(--bg);\n  border-bottom-left-radius: var(--curve);\n  border-bottom-right-radius: var(--curve);\n}\n.about-inner {\n  display: grid;\n  grid-template-columns: 240px minmax(0, 1fr);\n  gap: clamp(32px, 5vw, 64px);\n  align-items: start;\n  max-width: 920px;\n}\n@media (max-width: 720px) {\n  .about-inner { grid-template-columns: 1fr; gap: 32px; }\n}\n\n.portrait {\n  width: 240px;\n  max-width: 100%;\n  aspect-ratio: 4 / 5;\n  border-radius: 12px;\n  overflow: hidden;\n  position: relative;\n  flex-shrink: 0;\n  border: 1px solid var(--line);\n  background: var(--bg);\n}\n.portrait .ph {\n  position: absolute; inset: 0;\n  background-image: repeating-linear-gradient(135deg, var(--line-soft) 0 12px, transparent 12px 24px);\n}\n.portrait .led {\n  position: absolute; right: 12px; top: 12px;\n  width: 11px; height: 11px; border-radius: 50%;\n  background: oklch(0.7 0.14 150);\n  box-shadow: 0 0 0 3px color-mix(in oklab, var(--bg) 80%, transparent);\n}\n.portrait-tag {\n  position: absolute; left: 12px; bottom: 12px;\n  font-size: 11px; color: var(--muted);\n  background: color-mix(in oklab, var(--surface) 86%, transparent);\n  border: 1px solid var(--line);\n  padding: 4px 8px; border-radius: 7px;\n}\n\n.about-id-text { margin-bottom: 22px; }\n.about-id-text .who {\n  font-family: var(--font-head);\n  font-weight: 600; font-size: 19px; letter-spacing: -0.01em;\n  color: var(--ink);\n}\n.about-id-text .role { font-size: 14.5px; color: var(--muted); }\n\n.about-body p { color: var(--ink-soft); font-size: 19px; line-height: 1.62; margin: 0 0 22px; }\n.about-body p strong { color: var(--ink); font-weight: 600; }\n.about-body .lead {\n  font-family: var(--font-head);\n  font-size: clamp(22px, 2.6vw, 30px);\n  font-weight: 500;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  line-height: 1.22;\n  margin-bottom: 28px;\n}\n.about-body p:last-child { margin-bottom: 0; }\n\n/* =========================================================\n   CONTACT\n   ========================================================= */\n/* =========================================================\n   CONTACT  — full-bleed dark; the ABOUT section above curves\n   down into it via rounded bottom corners + a negative tuck.\n   ========================================================= */\n.contact {\n  position: relative;\n  z-index: 0;\n  background: #0c0e14;\n  color: #fff;\n  margin-top: calc(-1 * var(--curve));\n  padding-top: calc(var(--curve) + clamp(72px, 11vh, 132px));\n  padding-bottom: clamp(64px, 10vh, 120px);\n  text-align: left;\n}\n.contact-row {\n  display: grid;\n  grid-template-columns: minmax(0, 1fr) clamp(220px, 32%, 380px);\n  gap: clamp(32px, 6vw, 80px);\n  align-items: center;\n}\n@media (max-width: 760px) {\n  .contact-row { grid-template-columns: 1fr; gap: 36px; }\n}\n.contact .eyebrow {\n  justify-content: flex-start;\n  color: color-mix(in oklab, var(--accent) 50%, #fff);\n}\n.contact .eyebrow::before { background: color-mix(in oklab, var(--accent) 50%, #fff); }\n\n.mailto {\n  display: inline-block;\n  font-family: var(--font-head);\n  font-weight: 500;\n  letter-spacing: -0.03em;\n  font-size: clamp(26px, 4.6vw, 54px);\n  line-height: 1.04;\n  color: #fff;\n  margin: 22px 0 24px;\n  text-decoration: underline;\n  text-decoration-thickness: 2px;\n  text-underline-offset: 8px;\n  text-decoration-color: oklch(1 0 0 / 0.35);\n  transition: text-decoration-color 0.3s var(--ease), color 0.3s var(--ease);\n  word-break: break-word;\n}\n.mailto .arrow {\n  display: inline-block;\n  font-size: 0.42em;\n  vertical-align: 0.55em;\n  transition: transform 0.3s var(--ease);\n}\n.mailto:hover { text-decoration-color: var(--accent); }\n.mailto:hover .arrow { transform: translate(4px, -4px); }\n\n.contact p {\n  color: oklch(0.82 0.012 255);\n  font-size: clamp(16px, 1.5vw, 18px);\n  line-height: 1.62;\n  max-width: 52ch;\n  margin: 0 0 30px;\n}\n\n.socials { display: flex; flex-wrap: wrap; gap: 10px; }\n.socials a {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 14px; color: oklch(0.82 0.012 255);\n  border: 1px solid oklch(1 0 0 / 0.18); border-radius: 999px;\n  padding: 9px 16px;\n  transition: color 0.25s var(--ease), border-color 0.25s var(--ease), background 0.25s var(--ease);\n}\n.socials a svg { width: 16px; height: 16px; flex-shrink: 0; }\n.socials a:hover { color: #fff; border-color: oklch(1 0 0 / 0.5); background: oklch(1 0 0 / 0.08); }\n\n.contact-art image-slot {\n  display: block;\n  width: 100%;\n  border: 1px dashed oklch(1 0 0 / 0.22);\n  border-radius: 16px;\n  background: oklch(1 0 0 / 0.03);\n}\n@media (max-width: 760px) { .contact-art { max-width: 320px; } }\n\n/* =========================================================\n   FOOTER\n   ========================================================= */\n.foot {\n  position: relative;\n  z-index: 0;\n  background: #0c0e14;\n  color: oklch(0.6 0.01 255);\n  border-top: 1px solid oklch(1 0 0 / 0.08);\n  padding: 30px var(--gutter);\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 16px; flex-wrap: wrap;\n  font-size: 14px;\n}\n.foot a { color: oklch(0.72 0.01 255); }\n.foot a:hover { color: #fff; }\n\n/* =========================================================\n   SCROLL REVEAL\n   Transition-based; the script also writes inline opacity/\n   transform on reveal so a stalled compositor can't pin it hidden.\n   ========================================================= */\n.reveal {\n  opacity: 0;\n  transform: translateY(26px);\n  transition: opacity 0.8s var(--ease), transform 0.8s var(--ease);\n  transition-delay: var(--d, 0ms);\n}\n.reveal.in { opacity: 1; transform: none; }\n/* If JS is disabled, never hide content. */\n.no-js .reveal { opacity: 1; transform: none; }\n\n/* ---- Page-load entrance ---- */\n.load-up {\n  opacity: 0;\n  transform: translateY(20px);\n  transition: opacity 0.75s var(--ease), transform 0.75s var(--ease);\n  transition-delay: var(--ld, 0ms);\n}\n.load-fade {\n  opacity: 0;\n  transition: opacity 1.1s ease;\n  transition-delay: var(--ld, 0ms);\n}\nbody.loaded .load-up { opacity: 1; transform: none; }\nbody.loaded .load-fade { opacity: 1; }\n.no-js .load-up, .no-js .load-fade { opacity: 1; transform: none; }\n\n/* Tweaks mount */\n#tweaks-root { position: fixed; z-index: 90; }\n\n/* =========================================================\n   ALL-WORK ARCHIVE PAGE\n   ========================================================= */\n.archive-head { padding-top: 140px; }\n.archive-head .back {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--font-head); font-weight: 600; font-size: 14px;\n  color: var(--ink-soft); margin-bottom: 30px;\n  transition: color 0.25s var(--ease), gap 0.25s var(--ease);\n}\n.archive-head .back:hover { color: var(--accent-press); gap: 12px; }\n.archive-head h1 {\n  font-family: var(--font-head);\n  font-size: clamp(44px, 8vw, 96px);\n  letter-spacing: -0.04em;\n  margin-bottom: 18px;\n}\n.archive-head h1 .em { color: var(--accent-press); font-style: italic; font-weight: 500; }\n.archive-head p { color: var(--ink-soft); font-size: 19px; max-width: 50ch; }\n\n.year-row {\n  display: flex; align-items: baseline; gap: 18px;\n  margin: 56px 0 4px;\n}\n.year-row .y {\n  font-family: var(--font-head); font-weight: 600;\n  font-size: 15px; letter-spacing: 0.12em;\n  color: var(--accent-press);\n}\n.year-row .rule { flex: 1; height: 1px; background: var(--line); }\n.year-row .count { font-size: 13px; color: var(--muted); }\n\n/* =========================================================\n   SIDE QUESTS — PHOTO GALLERY\n   ========================================================= */\n.gallery {\n  columns: 3;\n  column-gap: 20px;\n}\n@media (max-width: 900px) { .gallery { columns: 2; } }\n@media (max-width: 600px) { .gallery { columns: 1; } }\n\n.shot {\n  break-inside: avoid;\n  margin: 0 0 20px;\n}\n.shot image-slot {\n  display: block;\n  width: 100%;\n  border: 1px solid var(--line);\n  background: var(--bg-2);\n  transition: transform 0.5s var(--ease), box-shadow 0.5s var(--ease);\n}\n.shot:hover image-slot {\n  transform: translateY(-4px);\n  box-shadow: 0 24px 44px -26px oklch(0.4 0.04 255 / 0.5);\n}\n.shot figcaption {\n  font-family: var(--font-head);\n  font-size: 13px;\n  font-weight: 500;\n  letter-spacing: 0.02em;\n  color: var(--muted);\n  margin-top: 11px;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n.shot figcaption::before {\n  content: \"\";\n  width: 5px; height: 5px; border-radius: 50%;\n  background: var(--accent);\n  flex-shrink: 0;\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body style=\"background-color: rgb(255, 255, 255)\">\n\n<!-- ===================== NAV ===================== -->\n<nav class=\"nav scrolled\" id=\"nav\">\n  <a class=\"brand\" href=\"Betty — Portfolio.html\"><image-slot id=\"brand-logo\" class=\"brand-logo\" shape=\"circle\" placeholder=\"Logo\"><\u002Fimage-slot>Betty&nbsp;Goh<\u002Fa>\n  <button class=\"nav-toggle\" id=\"navToggle\" aria-label=\"Menu\" aria-expanded=\"false\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fbutton>\n  <div class=\"nav-links\" id=\"navLinks\">\n    <a href=\"Betty — Portfolio.html#work\">Work<\u002Fa>\n    <a href=\"Side Quests.html\">Side quests<\u002Fa>\n    <a href=\"Betty — Portfolio.html#about\">About<\u002Fa>\n    <a href=\"Betty — Portfolio.html#contact\" class=\"cta\">Let's talk<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ===================== HEADER ===================== -->\n<header class=\"archive-head\">\n  <div class=\"wrap\">\n    <a class=\"back load-up\" href=\"Betty — Portfolio.html\" style=\"--ld:0ms\">← Back home<\u002Fa>\n    <h1 class=\"load-up\" style=\"--ld:80ms\">Side <span class=\"em\">quests.<\u002Fspan><\u002Fh1>\n    <p class=\"load-up\" style=\"--ld:160ms\">When I'm not designing, I'm usually somewhere with a camera — no client, no brief, just light I liked. A growing roll of streets, skies and small Singapore moments.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ===================== GALLERY ===================== -->\n<section class=\"section-pad curves-down\" style=\"padding-top: clamp(40px, 6vh, 64px); padding-bottom: clamp(80px, 14vh, 150px)\">\n  <div class=\"wrap\">\n    <div class=\"gallery\">\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-1\" style=\"height:380px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>Tiong Bahru · 6:48am<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-2\" style=\"height:260px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>Hawker neon<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-3\" style=\"height:320px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>Chinatown back lane<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-4\" style=\"height:300px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>MacRitchie, mid-trek<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-5\" style=\"height:420px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>East Coast · low tide<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-6\" style=\"height:280px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>Marina haze<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-7\" style=\"height:340px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>Kampong Glam doorway<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-8\" style=\"height:300px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>Last light · Pulau Ubin<\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <figure class=\"shot reveal\">\n        <image-slot id=\"sq-9\" style=\"height:400px\" shape=\"rounded\" radius=\"14\" placeholder=\"Drop a photo\"><\u002Fimage-slot>\n        <figcaption>Rain, from the MRT<\u002Ffigcaption>\n      <\u002Ffigure>\n\n    <\u002Fdiv>\n\n    <div class=\"work-cta reveal\" style=\"margin-top: clamp(56px, 9vh, 96px)\">\n      <a class=\"btn btn-ghost\" href=\"Betty — Portfolio.html#contact\">Say hello <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== CONTACT ===================== -->\n<section class=\"contact\" id=\"contact\">\n  <div class=\"wrap\">\n    <div class=\"contact-row\">\n      <div class=\"contact-main\">\n        <span class=\"eyebrow reveal\">Get in touch<\u002Fspan>\n        <a class=\"mailto reveal\" style=\"--d:60ms\" href=\"mailto:hello@bettygoh.design\">hello@bettygoh.design <span class=\"arrow\">↗<\u002Fspan><\u002Fa>\n        <p class=\"reveal\" style=\"--d:120ms\">Some of my best thinking happens over a slow bowl of noodles and a plate of cut fruit — small, unfussy acts of care. Consider this a little of that, from me to you. Thanks for stopping by.<\u002Fp>\n        <div class=\"socials reveal\" style=\"--d:180ms\">\n          <a href=\"#\" aria-label=\"LinkedIn\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M4.98 3.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-.95 1.83-1.95 3.77-1.95 4.03 0 4.78 2.5 4.78 5.75V21h-4v-5.3c0-1.26-.02-2.9-1.77-2.9-1.77 0-2.04 1.38-2.04 2.8V21H9z\"><\u002Fpath><\u002Fsvg>LinkedIn<\u002Fa>\n          <a href=\"#\" aria-label=\"Instagram\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" aria-hidden=\"true\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"5\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><circle cx=\"17.5\" cy=\"6.5\" r=\"1.1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>Instagram<\u002Fa>\n          <a href=\"#\" aria-label=\"X\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M17.5 3h3l-7.1 8.1L22 21h-6.6l-4.3-5.6L6.2 21H3.1l7.6-8.7L2.4 3H9l3.9 5.2L17.5 3zm-1.1 16h1.7L7.7 4.8H5.9z\"><\u002Fpath><\u002Fsvg>X / Twitter<\u002Fa>\n          <a href=\"#\" aria-label=\"Résumé\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 3v5h5\"><\u002Fpath><path d=\"M8.5 13h7M8.5 17h7\"><\u002Fpath><\u002Fsvg>Résumé ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"contact-art reveal\" style=\"--d:160ms\">\n        <image-slot id=\"contact-doodle\" style=\"height:280px\" shape=\"rect\" placeholder=\"Drop a doodle / photo\"><\u002Fimage-slot>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"foot\">\n  <span>© 2026 Betty Goh · Designed in Singapore 🇸🇬<\u002Fspan>\n  <a href=\"Betty — Portfolio.html\">Back to home ↑<\u002Fa>\n<\u002Ffooter>\n\n<!-- ===================== COMPONENTS + INTERACTIONS ===================== -->\n<script src=\"49babfe2-6bb5-4cb9-95a1-f30fe7bb9a8a\"><\u002Fscript>\n<script>\n  const nav = document.getElementById('nav');\n  const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 24);\n  onScroll();\n  window.addEventListener('scroll', onScroll, { passive: true });\n\n  // Mobile menu toggle\n  const navToggle = document.getElementById('navToggle');\n  const navLinks = document.getElementById('navLinks');\n  if (navToggle) {\n    const setOpen = (open) => {\n      nav.classList.toggle('open', open);\n      navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');\n    };\n    navToggle.addEventListener('click', () => setOpen(!nav.classList.contains('open')));\n    navLinks.addEventListener('click', (e) => { if (e.target.tagName === 'A') setOpen(false); });\n    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setOpen(false); });\n  }\n\n  // Page-load entrance (failsafe-protected).\n  const loadEls = document.querySelectorAll('.load-up, .load-fade');\n  requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.add('loaded')));\n  setTimeout(() => {\n    document.body.classList.add('loaded');\n    loadEls.forEach((el) => {\n      if (getComputedStyle(el).opacity === '0') {\n        el.style.transition = 'none'; el.style.opacity = '1'; el.style.transform = 'none';\n      }\n    });\n  }, 1500);\n\n  // Scroll reveal with hard failsafe.\n  const reveals = document.querySelectorAll('.reveal');\n  const reveal = (el) => el.classList.add('in');\n  const hardShow = (el) => {\n    el.style.transition = 'none';\n    el.classList.add('in');\n    el.style.opacity = '1';\n    el.style.transform = 'none';\n  };\n  let io;\n  try {\n    io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) { reveal(e.target); io.unobserve(e.target); } });\n    }, { threshold: 0.1, rootMargin: '0px 0px -4% 0px' });\n    reveals.forEach((el) => io.observe(el));\n  } catch (err) { reveals.forEach(hardShow); }\n  requestAnimationFrame(() => {\n    reveals.forEach((el) => {\n      const r = el.getBoundingClientRect();\n      if (r.top < window.innerHeight * 0.96) hardShow(el);\n    });\n  });\n  setTimeout(() => document.querySelectorAll('.reveal:not(.in)').forEach(hardShow), 1400);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
